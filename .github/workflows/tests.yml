name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    # windows-latest matches the shop PCs the app actually runs on, and its
    # Python includes tkinter so the GUI smoke tests run for real.
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pytest -q
